<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>額冷的paisuV4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com');
        body { background: #fff5f7; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(244, 114, 182, 0.1); border: 1px solid #fce7f3; }
        .btn-pink { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); transition: all 0.3s ease; }
        .btn-pink:active { transform: scale(0.98); }
        .btn-action { background: #fdf2f8; border: 1.5px dashed #f472b6; color: #db2777; transition: all 0.2s; }
        .btn-action:active { background: #fbcfe8; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- 頂部總覽 -->
    <header class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <div class="flex items-center justify-center md:justify-start gap-2">
                <h1 class="text-2xl md:text-3xl font-black text-pink-500 tracking-tighter">💎 額冷的paisu</h1>
                <a href="https://docs.google.com/spreadsheets/d/1sSJsUmdTPTF4Wh9hcGO0p-5hMSrbPCgGBhnBYR-Z2PQ/edit?usp=sharing" target="_blank" 
                   class="bg-white border border-pink-200 text-pink-400 px-2 py-1 rounded-full text-[10px] font-bold">更新股數</a>
            </div>
            <p class="text-slate-400 font-bold mt-1 text-[10px] md:text-sm">數據由 Google Sheets 自動驅動</p>
        </div>
        <div class="glass-card w-full md:w-auto px-6 py-3 bg-white/50 text-center md:text-right">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">總預估資產淨值</p>
            <h2 id="total-net-worth" class="text-2xl md:text-3xl font-black text-slate-800 tracking-tighter">$ 0</h2>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <!-- 1. 股票表格 -->
            <div class="glass-card p-5 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-pink-600"><i class="fas fa-chart-line mr-2"></i>投資市值</h2>
                    <button onclick="fetchGoogleData()" class="text-[10px] bg-pink-50 text-pink-500 px-3 py-1.5 rounded-full font-bold">刷新</button>
                </div>
                <div class="overflow-x-auto -mx-2 px-2 text-sm">
                    <table class="w-full text-left border-collapse min-w-[300px]">
                        <thead>
                            <tr class="text-slate-400 text-[10px] border-b border-pink-50">
                                <th class="pb-3">名稱</th><th class="pb-3 text-right">股數</th>
                                <th class="pb-3 text-right text-pink-400">市價</th><th class="pb-3 text-right">市值</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list"></tbody>
                    </table>
                </div>
            </div>

            <!-- 2. 四帳戶 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="glass-card p-3 border-l-4 border-pink-400"><p class="text-[10px] text-slate-400 font-bold">生活帳戶</p><p id="wallet-val" class="text-lg font-black text-slate-700">$ 0</p></div>
                <div class="glass-card p-3 border-l-4 border-indigo-400"><p class="text-[10px] text-indigo-400 font-bold">儲蓄帳戶</p><p id="savings-val" class="text-lg font-black text-indigo-600">$ 0</p></div>
                <div class="glass-card p-3 border-l-4 border-yellow-400"><p class="text-[10px] text-yellow-500 font-bold">證券交割</p><p id="brokerage-val" class="text-lg font-black text-slate-700">$ 0</p></div>
                <div class="glass-card p-3 border-l-4 border-emerald-400"><p class="text-[10px] text-emerald-500 font-bold">口袋現金</p><p id="cash-val" class="text-lg font-black text-slate-700">$ 0</p></div>
            </div>

            <!-- 3. 快速記帳 (含新增的一鍵功能) -->
            <div class="glass-card p-6 space-y-4">
                <h3 class="font-black text-slate-700 text-lg">✍️ 快速記帳</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="quickWithdraw()" class="btn-action py-2.5 rounded-xl text-[10px] font-bold">
                        <i class="fas fa-bolt mr-1"></i> ATM 提款 (生活轉現)
                    </button>
                    <button onclick="quickSave()" class="btn-action py-2.5 rounded-xl text-[10px] font-bold">
                        <i class="fas fa-piggy-bank mr-1"></i> 存起來 (生活轉儲)
                    </button>
                </div>
                <div class="flex gap-1.5 p-1 bg-slate-100 rounded-xl">
                    <button onclick="setAcc('wallet')" id="btn-wallet" class="flex-1 py-2 rounded-lg text-[10px] font-bold transition">生活</button>
                    <button onclick="setAcc('savings')" id="btn-savings" class="flex-1 py-2 rounded-lg text-[10px] font-bold transition">儲蓄</button>
                    <button onclick="setAcc('brokerage')" id="btn-brokerage" class="flex-1 py-2 rounded-lg text-[10px] font-bold transition">交割</button>
                    <button onclick="setAcc('cash')" id="btn-cash" class="flex-1 py-2 rounded-lg text-[10px] font-bold transition">現金</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="t-desc" placeholder="項目內容" class="col-span-2 bg-slate-50 p-3 rounded-xl outline-none text-sm">
                    <input type="number" id="t-amount" placeholder="金額" class="col-span-1 bg-slate-50 p-3 rounded-xl outline-none text-sm">
                </div>
                <button onclick="addTrans()" class="w-full btn-pink text-white py-3.5 rounded-xl font-black shadow-lg">紀錄入帳 / 支出</button>
            </div>
        </div>

        <!-- 數據管理 -->
        <div class="space-y-6 text-center">
            <div class="glass-card p-6">
                <h3 class="font-black text-slate-700 mb-4 text-sm">⚙️ 數據管理</h3>
                <div class="grid grid-cols-2 lg:grid-cols-1 gap-2">
                    <button onclick="exportData()" class="py-2.5 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-[10px]">📥 備份數據</button>
                    <button onclick="importData()" class="py-2.5 bg-slate-50 text-slate-600 rounded-xl font-bold text-[10px]">📤 還原數據</button>
                    <button onclick="clearHistory()" class="col-span-2 lg:col-span-1 mt-2 text-rose-300 font-bold text-[10px] underline">清空資料</button>
                </div>
            </div>
        </div>

        <!-- 4. 帳務流水帳 -->
        <div class="lg:col-span-3">
            <div class="glass-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-700">📜 最近帳務流水</h3>
                    <button onclick="undoLastAction()" class="text-[10px] text-indigo-500 font-bold"><i class="fas fa-undo-alt mr-1"></i> 復原</button>
                </div>
                <div id="trans-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 max-h-[400px] overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbziOxOkH-JDDXJSQFSn0t4_9hVto_VhBl1SauC1AAbhaavX6HF0pg7bWi85Iv-PAPPW/exec';
    let storage = JSON.parse(localStorage.getItem('perfectMaster_V4')) || { wallet: 0, savings: 0, brokerage: 0, cash: 0, trans: [] };
    storage.selectedAcc = storage.selectedAcc || 'wallet';
    let historyStack = [], liveStocks = [];

    function exportData() {
        const encodedData = btoa(encodeURIComponent(JSON.stringify(storage)));
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy); dummy.value = encodedData; dummy.select();
        document.execCommand("copy"); document.body.removeChild(dummy);
        alert("備份代碼已複製！");
    }

    function importData() {
        const code = prompt("請貼上備份代碼：");
        if (!code) return;
        try {
            storage = JSON.parse(decodeURIComponent(atob(code)));
            saveAndRender();
            alert("還原成功！");
        } catch (e) { alert("格式錯誤！"); }
    }

    function saveState() {
        if (historyStack.length > 10) historyStack.shift();
        historyStack.push(JSON.stringify(storage));
    }

    function undoLastAction() {
        if (historyStack.length === 0) return alert("無法復原！");
        storage = JSON.parse(historyStack.pop());
        saveAndRender();
    }

    // --- 一鍵功能 ---
    function quickWithdraw() {
        const amount = parseFloat(prompt("提款金額 (生活 -> 現金)："));
        if (!amount || amount <= 0) return;
        saveState();
        storage.wallet -= amount; storage.cash += amount;
        storage.trans.push({ acc: 'wallet', desc: `🏧 提款`, amount: -amount });
        storage.trans.push({ acc: 'cash', desc: `🏧 提款存入`, amount: amount });
        saveAndRender();
    }

    function quickSave() {
        const amount = parseFloat(prompt("要存多少錢呢？ (生活 -> 儲蓄)："));
        if (!amount || amount <= 0) return;
        saveState();
        storage.wallet -= amount; storage.savings += amount;
        storage.trans.push({ acc: 'wallet', desc: `💰 存起來`, amount: -amount });
        storage.trans.push({ acc: 'savings', desc: `💰 定存入帳`, amount: amount });
        saveAndRender();
    }

    async function fetchGoogleData() {
        try {
            const response = await fetch(GOOGLE_API_URL);
            liveStocks = await response.json();
            render();
        } catch (e) { console.error("API 連線失敗"); }
    }

    function setAcc(acc) {
        storage.selectedAcc = acc;
        const colors = { wallet:'bg-pink-500', savings:'bg-indigo-500', brokerage:'bg-slate-800', cash:'bg-emerald-500' };
        ['wallet', 'savings', 'brokerage', 'cash'].forEach(a => {
            const btn = document.getElementById(`btn-${a}`);
            btn.className = `flex-1 py-2 rounded-lg text-[10px] font-bold transition ${a === acc ? colors[a] + ' text-white shadow-md' : 'text-slate-400'}`;
        });
    }

    function addTrans() {
        const desc = document.getElementById('t-desc').value;
        const amount = parseFloat(document.getElementById('t-amount').value);
        if(!desc || isNaN(amount)) return;
        saveState();
        storage[storage.selectedAcc] += amount;
        storage.trans.push({ acc: storage.selectedAcc, desc, amount });
        saveAndRender();
        document.getElementById('t-desc').value = '';
        document.getElementById('t-amount').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('perfectMaster_V4', JSON.stringify(storage));
        render();
    }

    function render() {
        ['wallet', 'savings', 'brokerage', 'cash'].forEach(a => {
            document.getElementById(`${a}-val`).innerText = `$ ${storage[a].toLocaleString()}`;
        });
        const sList = document.getElementById('stock-list');
        sList.innerHTML = ''; let stockTotal = 0;
        if(liveStocks) {
            liveStocks.forEach(s => {
                const val = s.price * s.qty; stockTotal += val;
                sList.innerHTML += `<tr class="border-b border-pink-50"><td class="py-4 font-bold text-slate-700">${s.name}</td><td class="text-right text-slate-500 text-xs">${s.qty}</td><td class="text-right text-pink-500 font-bold">$${s.price.toFixed(1)}</td><td class="text-right font-black text-slate-700">$${Math.round(val).toLocaleString()}</td></tr>`;
            });
        }
        document.getElementById('total-net-worth').innerText = `$ ${Math.round(storage.wallet + storage.savings + storage.brokerage + storage.cash + stockTotal).toLocaleString()}`;
        document.getElementById('trans-list').innerHTML = storage.trans.slice(-12).reverse().map(t => `
            <div class="flex justify-between items-center p-3 bg-white border border-slate-50 rounded-xl shadow-sm">
                <div><p class="font-bold text-[11px] text-slate-600">${t.desc}</p><p class="text-[8px] text-slate-300 font-bold uppercase">${t.acc}</p></div>
                <span class="font-black text-xs ${t.amount < 0 ? 'text-rose-400' : 'text-emerald-500'}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}</span>
            </div>
        `).join('');
    }

    function clearHistory() {
        if(confirm('確定清空？')) { storage = { wallet: 0, savings: 0, brokerage: 0, cash: 0, trans: [] }; saveAndRender(); }
    }

    setAcc('wallet');
    fetchGoogleData();
    render();
</script>
</body>
</html>
