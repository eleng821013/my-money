<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的完美資產管家 V4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com');
        body { background: #fff5f7; font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(244, 114, 182, 0.15); border: 1px solid #fce7f3; }
        .btn-pink { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); transition: all 0.3s ease; }
        .btn-pink:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4); }
        .btn-withdraw { background: #fdf2f8; border: 2px dashed #f472b6; color: #db2777; }
        @media (max-width: 640px) { table { font-size: 0.85rem; } }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- 頂部總覽 -->
    <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
        <div>
            <div class="flex items-center justify-center md:justify-start gap-3">
                <h1 class="text-3xl font-black text-pink-500 tracking-tighter">💎 完美資產管家</h1>
                <a href="https://docs.google.com/spreadsheets/d/1sSJsUmdTPTF4Wh9hcGO0p-5hMSrbPCgGBhnBYR-Z2PQ/edit?usp=sharing" target="_blank" 
                   class="bg-white border border-pink-200 text-pink-400 px-3 py-1 rounded-full text-[10px] font-bold hover:bg-pink-50 transition shadow-sm">
                   <i class="fas fa-edit mr-1"></i> 更新股數傳送門
                </a>
            </div>
            <p class="text-slate-400 font-bold mt-1 text-sm">數據由 Google Sheets 自動驅動</p>
        </div>
        <div class="glass-card px-8 py-4 bg-white/50 text-right">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">總預估資產淨值</p>
            <h2 id="total-net-worth" class="text-3xl font-black text-slate-800 tracking-tighter">$ 0</h2>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- 左側：投資庫存 -->
        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-6 md:p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-pink-600"><i class="fas fa-wallet mr-2"></i>投資市值</h2>
                    <button onclick="fetchGoogleData()" class="text-xs bg-pink-50 text-pink-500 px-4 py-2 rounded-full font-bold hover:bg-pink-100 transition">
                        <i class="fas fa-sync-alt mr-1"></i> 刷新行情
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 text-xs border-b border-pink-50">
                                <th class="pb-4 px-1">名稱</th><th class="pb-4 text-right">股數</th>
                                <th class="pb-4 text-right text-pink-500">市價</th><th class="pb-4 text-right">市值</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list"></tbody>
                    </table>
                </div>
            </div>

            <!-- 最近紀錄 -->
            <div class="glass-card p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-slate-700">📜 帳務流水帳</h3>
                    <button onclick="undoLastAction()" class="text-xs text-indigo-500 font-bold hover:underline">
                        <i class="fas fa-undo-alt mr-1"></i> 復原上一步
                    </button>
                </div>
                <div id="trans-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- 右側：四帳戶卡片 -->
        <div class="space-y-6">
            <div class="grid grid-cols-2 lg:grid-cols-1 gap-4">
                <div class="glass-card p-4 border-l-8 border-pink-400"><p class="text-[10px] text-slate-400 font-bold">生活錢包</p><p id="wallet-val" class="text-xl font-black text-slate-700">$ 0</p></div>
                <div class="glass-card p-4 border-l-8 border-indigo-400 bg-indigo-50/30"><p class="text-[10px] text-indigo-400 font-bold">儲蓄帳戶</p><p id="savings-val" class="text-xl font-black text-indigo-600">$ 0</p></div>
                <div class="glass-card p-4 border-l-8 border-yellow-400 bg-yellow-50/30"><p class="text-[10px] text-yellow-500 font-bold">證券交割</p><p id="brokerage-val" class="text-xl font-black text-slate-700">$ 0</p></div>
                <div class="glass-card p-4 border-l-8 border-emerald-400 bg-emerald-50/30"><p class="text-[10px] text-emerald-500 font-bold">口袋現金</p><p id="cash-val" class="text-xl font-black text-slate-700">$ 0</p></div>
            </div>

            <!-- 記帳表單 -->
            <div class="glass-card p-8 space-y-4 shadow-2xl shadow-pink-100">
                <h3 class="font-black text-slate-700 text-center text-lg">✍️ 快速記帳</h3>
                <button onclick="quickWithdraw()" class="w-full btn-withdraw py-2 rounded-xl text-xs font-bold transition hover:bg-pink-100">
                    <i class="fas fa-bolt mr-1"></i> ATM 提款 (生活轉現金)
                </button>
                <div class="flex flex-wrap gap-2 p-1 bg-slate-100 rounded-2xl">
                    <button onclick="setAcc('wallet')" id="btn-wallet" class="flex-1 py-2 rounded-xl text-[10px] font-bold transition bg-pink-500 text-white">生活</button>
                    <button onclick="setAcc('savings')" id="btn-savings" class="flex-1 py-2 rounded-xl text-[10px] font-bold transition text-slate-400">儲蓄</button>
                    <button onclick="setAcc('brokerage')" id="btn-brokerage" class="flex-1 py-2 rounded-xl text-[10px] font-bold transition text-slate-400">交割</button>
                    <button onclick="setAcc('cash')" id="btn-cash" class="flex-1 py-2 rounded-xl text-[10px] font-bold transition text-slate-400">現金</button>
                </div>
                <input type="text" id="t-desc" placeholder="項目內容..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-none">
                <input type="number" id="t-amount" placeholder="金額..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-none">
                <button onclick="addTrans()" class="w-full btn-pink text-white py-4 rounded-2xl font-black shadow-xl active:scale-95">紀錄入帳</button>
                <button onclick="clearHistory()" class="w-full text-[10px] text-slate-300 hover:text-red-500 transition font-bold mt-2 text-center underline">🗑️ 清除全部數據 (重來)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbziOxOkH-JDDXJSQFSn0t4_9hVto_VhBl1SauC1AAbhaavX6HF0pg7bWi85Iv-PAPPW/exec';
    
    // 救援歷史數據邏輯
    let savedData = JSON.parse(localStorage.getItem('perfectMaster_V4')) || 
                    JSON.parse(localStorage.getItem('perfectMaster_V3_Final')) || 
                    JSON.parse(localStorage.getItem('perfectMaster_V3_Minimal')) || 
                    { wallet: 0, savings: 0, brokerage: 0, cash: 0, trans: [] };

    let storage = savedData;
    if (typeof storage.cash === 'undefined') storage.cash = 0;
    storage.selectedAcc = 'wallet';

    // 用於復原上一步的暫存
    let historyStack = [];

    function saveState() {
        // 限制復原步數為 10 步
        if (historyStack.length > 10) historyStack.shift();
        historyStack.push(JSON.stringify(storage));
    }

    function undoLastAction() {
        if (historyStack.length === 0) return alert("沒有上一步可以復原囉！");
        const lastState = historyStack.pop();
        storage = JSON.parse(lastState);
        saveAndRender(false); // 不再儲存新狀態
        alert("已成功復原到上一步！");
    }

    function quickWithdraw() {
        const amount = parseFloat(prompt("提款金額 (生活 -> 現金)："));
        if (!amount || isNaN(amount) || amount <= 0) return;
        saveState();
        storage.wallet -= amount;
        storage.cash += amount;
        storage.trans.push({ acc: 'wallet', desc: `🏧 提款支出`, amount: -amount, date: new Date().toLocaleDateString() });
        storage.trans.push({ acc: 'cash', desc: `🏧 提款存入`, amount: amount, date: new Date().toLocaleDateString() });
        saveAndRender();
    }

    async function fetchGoogleData() {
        try {
            const response = await fetch(GOOGLE_API_URL);
            liveStocks = await response.json();
            render();
        } catch (e) { console.error("API 連線失敗"); }
    }

    function setAcc(acc) {
        storage.selectedAcc = acc;
        ['wallet', 'savings', 'brokerage', 'cash'].forEach(a => {
            const btn = document.getElementById(`btn-${a}`);
            const colors = { wallet:'bg-pink-500', savings:'bg-indigo-500', brokerage:'bg-slate-800', cash:'bg-emerald-500' };
            btn.className = `flex-1 py-2 rounded-xl text-[10px] font-bold transition ${a === acc ? colors[a] + ' text-white shadow-md' : 'text-slate-400'}`;
        });
    }

    function addTrans() {
        const desc = document.getElementById('t-desc').value;
        const amount = parseFloat(document.getElementById('t-amount').value);
        if(!desc || isNaN(amount)) return;
        saveState();
        storage[storage.selectedAcc] += amount;
        storage.trans.push({ acc: storage.selectedAcc, desc, amount, date: new Date().toLocaleDateString() });
        saveAndRender();
        document.getElementById('t-desc').value = '';
        document.getElementById('t-amount').value = '';
    }

    function saveAndRender(shouldSaveState = true) {
        localStorage.setItem('perfectMaster_V4', JSON.stringify(storage));
        render();
    }

    function render() {
        document.getElementById('wallet-val').innerText = `$ ${storage.wallet.toLocaleString()}`;
        document.getElementById('savings-val').innerText = `$ ${storage.savings.toLocaleString()}`;
        document.getElementById('brokerage-val').innerText = `$ ${storage.brokerage.toLocaleString()}`;
        document.getElementById('cash-val').innerText = `$ ${storage.cash.toLocaleString()}`;

        const sList = document.getElementById('stock-list');
        sList.innerHTML = '';
        let stockTotal = 0;
        if(typeof liveStocks !== 'undefined') {
            liveStocks.forEach(s => {
                const val = s.price * s.qty;
                stockTotal += val;
                sList.innerHTML += `<tr class="border-b border-pink-50"><td class="py-5 font-black text-slate-700">${s.name}</td><td class="text-right text-slate-500">${s.qty.toLocaleString()}</td><td class="text-right text-pink-500 font-bold">$${s.price.toFixed(2)}</td><td class="text-right font-black text-slate-700">$${Math.round(val).toLocaleString()}</td></tr>`;
            });
        }

        document.getElementById('total-net-worth').innerText = `$ ${Math.round(storage.wallet + storage.savings + storage.brokerage + storage.cash + stockTotal).toLocaleString()}`;
        document.getElementById('trans-list').innerHTML = storage.trans.slice(-8).reverse().map(t => `
            <div class="flex justify-between items-center p-4 bg-white border border-slate-50 rounded-2xl shadow-sm mb-2">
                <div><p class="font-bold text-xs text-slate-600">${t.desc}</p><p class="text-[9px] text-slate-300 font-bold uppercase">${t.acc}</p></div>
                <span class="font-black text-sm ${t.amount < 0 ? 'text-rose-400' : 'text-emerald-500'}">${t.amount.toLocaleString()}</span>
            </div>
        `).join('');
    }

    function clearHistory() {
        if(confirm('🚨 確定要「清空全部」帳務嗎？\n此動作將會清除所有錢包餘額與流水帳紀錄，且無法復原。')) {
            saveState(); // 清除前先存一個狀態，萬一後悔還能復原一次
            storage = { wallet: 0, savings: 0, brokerage: 0, cash: 0, trans: [], selectedAcc: 'wallet' };
            saveAndRender();
        }
    }

    setAcc('wallet');
    fetchGoogleData();
    render();
</script>
</body>
</html>
