<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的完美資產管家 V3.2</title>
 
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com');
        body { background: #fff5f7; font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(244, 114, 182, 0.15); border: 1px solid #fce7f3; }
        .btn-pink { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); transition: all 0.3s ease; }
        .btn-pink:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4); }
        /* 讓表格在手機上稍微縮小文字，避免破版 */
        @media (max-width: 640px) {
            table { font-size: 0.85rem; }
            .stock-name { min-width: 80px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- 頂部總覽 -->
    <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
        <div>
            <h1 class="text-3xl font-black text-pink-500 tracking-tighter">💎 完美資產管家</h1>
            <p class="text-slate-400 font-bold mt-1 text-sm">數據由 Google Sheets 自動驅動</p>
        </div>
        <div class="glass-card px-8 py-4 bg-white/50">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1 font-bold">總預估資產淨值</p>
            <h2 id="total-net-worth" class="text-4xl font-black text-slate-800 tracking-tighter">$ 0</h2>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- 左側：投資庫存 (極簡表格) -->
        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-6 md:p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-pink-600"><i class="fas fa-wallet mr-2"></i>投資市值</h2>
                    <button onclick="fetchGoogleData()" class="text-xs bg-pink-50 text-pink-500 px-4 py-2 rounded-full font-bold hover:bg-pink-100 transition">
                        <i class="fas fa-sync-alt mr-1"></i> 刷新行情
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 text-xs border-b border-pink-50">
                                <th class="pb-4 px-1">名稱</th>
                                <th class="pb-4 text-right">股數</th>
                                <th class="pb-4 text-right text-pink-500">市價</th>
                                <th class="pb-4 text-right">當前市值</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list">
                            <!-- 資料載入中 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 最近紀錄 -->
            <div class="glass-card p-8">
                <h3 class="text-xl font-black text-slate-700 mb-6">📜 最近帳務流水帳</h3>
                <div id="trans-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 帳務紀錄 -->
                </div>
            </div>
        </div>

        <!-- 右側：帳戶狀態與輸入 -->
        <div class="space-y-6">
            <div class="space-y-4">
                <div class="glass-card p-5 border-l-8 border-pink-400">
                    <p class="text-xs text-slate-400 font-bold mb-1">生活錢包</p>
                    <p id="wallet-val" class="text-2xl font-black text-slate-700">$ 0</p>
                </div>
                <div class="glass-card p-5 border-l-8 border-indigo-400 bg-indigo-50/30">
                    <p class="text-xs text-indigo-400 font-bold mb-1">夢想儲蓄池</p>
                    <p id="savings-val" class="text-2xl font-black text-indigo-600">$ 0</p>
                </div>
                <div class="glass-card p-5 border-l-8 border-yellow-400 bg-yellow-50/30">
                    <p class="text-xs text-yellow-500 font-bold mb-1">證券交割戶</p>
                    <p id="brokerage-val" class="text-2xl font-black text-slate-700">$ 0</p>
                </div>
            </div>

            <div class="glass-card p-8 space-y-5 shadow-2xl shadow-pink-100">
                <h3 class="font-black text-slate-700 text-lg text-center">✍️ 快速記帳</h3>
                <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                    <button onclick="setAcc('wallet')" id="btn-wallet" class="flex-1 py-3 rounded-xl text-xs font-bold transition bg-pink-500 text-white shadow-md">生活</button>
                    <button onclick="setAcc('savings')" id="btn-savings" class="flex-1 py-3 rounded-xl text-xs font-bold transition text-slate-400">儲蓄</button>
                    <button onclick="setAcc('brokerage')" id="btn-brokerage" class="flex-1 py-3 rounded-xl text-xs font-bold transition text-slate-400">交割</button>
                </div>
                <input type="text" id="t-desc" placeholder="項目內容..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-pink-200 border-none">
                <input type="number" id="t-amount" placeholder="金額 (支出加負號)..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-pink-200 border-none">
                <button onclick="addTrans()" class="w-full btn-pink text-white py-4 rounded-2xl font-black shadow-xl active:scale-95">紀錄入帳</button>
                <button onclick="clearHistory()" class="w-full text-[10px] text-slate-300 hover:text-red-400 transition font-bold mt-2 text-center">清空所有紀錄</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 記得填入妳的網址
    const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbziOxOkH-JDDXJSQFSn0t4_9hVto_VhBl1SauC1AAbhaavX6HF0pg7bWi85Iv-PAPPW/exec';

    let storage = JSON.parse(localStorage.getItem('perfectMaster_V3_Final')) || {
        wallet: 0, savings: 0, brokerage: 0, trans: [], selectedAcc: 'wallet'
    };
    let liveStocks = [];

    async function fetchGoogleData() {
        const sList = document.getElementById('stock-list');
        sList.innerHTML = '<tr><td colspan="4" class="py-4 text-xs text-slate-300">連線中...</td></tr>';
        try {
            const response = await fetch(GOOGLE_API_URL);
            liveStocks = await response.json();
            render();
        } catch (e) {
            sList.innerHTML = '<tr><td colspan="4" class="py-4 text-xs text-red-300">連線失敗</td></tr>';
        }
    }

    function setAcc(acc) {
        storage.selectedAcc = acc;
        ['wallet', 'savings', 'brokerage'].forEach(a => {
            const btn = document.getElementById(`btn-${a}`);
            btn.className = `flex-1 py-3 rounded-xl text-xs font-bold transition ${a === acc ? (a==='wallet'?'bg-pink-500':a==='savings'?'bg-indigo-500':'bg-slate-800') + ' text-white shadow-md' : 'text-slate-400'}`;
        });
    }

    function addTrans() {
        const desc = document.getElementById('t-desc').value;
        const amount = parseFloat(document.getElementById('t-amount').value);
        if(!desc || isNaN(amount)) return;
        storage[storage.selectedAcc] += amount;
        storage.trans.push({ acc: storage.selectedAcc, desc, amount, date: new Date().toLocaleDateString() });
        saveAndRender();
        document.getElementById('t-desc').value = '';
        document.getElementById('t-amount').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('perfectMaster_V3_Final', JSON.stringify(storage));
        render();
    }

    function render() {
        document.getElementById('wallet-val').innerText = `$ ${storage.wallet.toLocaleString()}`;
        document.getElementById('savings-val').innerText = `$ ${storage.savings.toLocaleString()}`;
        document.getElementById('brokerage-val').innerText = `$ ${storage.brokerage.toLocaleString()}`;

        const sList = document.getElementById('stock-list');
        sList.innerHTML = '';
        let stockMarketTotal = 0;

        liveStocks.forEach(s => {
            const val = s.price * s.qty;
            stockMarketTotal += val;
            const tr = document.createElement('tr');
            tr.className = "border-b border-pink-50 hover:bg-pink-50/30 transition";
            tr.innerHTML = `
                <td class="py-5 px-1 font-black text-slate-700 stock-name">${s.name}</td>
                <td class="text-right font-bold text-slate-500">${s.qty.toLocaleString()}</td>
                <td class="text-right text-pink-500 font-bold">$${s.price.toFixed(2)}</td>
                <td class="text-right font-black text-slate-700">$${Math.round(val).toLocaleString()}</td>
            `;
            sList.appendChild(tr);
        });

        document.getElementById('total-net-worth').innerText = `$ ${Math.round(storage.wallet + storage.savings + storage.brokerage + stockMarketTotal).toLocaleString()}`;

        const tList = document.getElementById('trans-list');
        tList.innerHTML = storage.trans.slice(-6).reverse().map(t => `
            <div class="flex justify-between items-center p-4 bg-white border border-slate-50 rounded-2xl shadow-sm">
                <div><p class="font-bold text-xs text-slate-600">${t.desc}</p><p class="text-[9px] text-slate-300 font-bold uppercase">${t.acc}</p></div>
                <span class="font-black text-sm ${t.amount < 0 ? 'text-rose-400' : 'text-emerald-500'}">${t.amount < 0 ? '' : '+'}${t.amount.toLocaleString()}</span>
            </div>
        `).join('');
    }

    function clearHistory() { if(confirm('確定清除帳務紀錄嗎？')) { storage.wallet = 0; storage.savings = 0; storage.brokerage = 0; storage.trans = []; saveAndRender(); } }
    setAcc('wallet');
    fetchGoogleData();
</script>
</body>
</html>
